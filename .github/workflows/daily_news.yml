name: Daily Tech News Pusher

on:
  schedule:
    # Cron 表达式使用 UTC 时间
    # 0 0 * * * 代表 UTC 00:00，即北京时间早上 08:00
    - cron: '20 9 * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行爬虫和推送脚本
      env:
        SERVER_CHAN_SENDKEY: ${{ secrets.SERVER_CHAN_SENDKEY }}
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }} #  新增dingtalk一行        
      run: |
        python fetch_news.py
